<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
 
  <title>Secure Document Portal</title>

  <style>
  *{
  padding: 0;
  margin: 0;
}
body {
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b57d0, #00c6ff);
      margin: 0;
      padding: 0;
      text-align: center;
      color: white;
    }

    header {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      font-size: 18px;
      border-radius: 0 0 20px 20px;
    }
    header h3{
      margin-top: 30px;
      margin-bottom: 20px;
      
    }

    .box {
      margin-top: 20vh;
      background: rgba(255,0,255,0.6);
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 8px #000;
    }
    .box h1{
      margin-bottom: 20px;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00e676;
      color: black;
      cursor: pointer;
      margin-top: 30px;
      box-shadow: inset 0 0 8px #000;
    }

    button:hover {
      background: #00c853;
      color: #ff0000;
    }
  </style>
  
</head>

<body>

  <header>
    <h3>Secure Cloud Viewer</h3>
  </header>

  <div class="box">
    <h1>Drive Portal</h1>

    <p>
      Accessing shared folder:<br>
      <b>Authorized <br> browser-only session</b>
    </p>

    <button id="open">
      Open in Browser
    </button>

  </div>

  <script>

    var btn = document.getElementById("open");

    btn.addEventListener("click", function () {

      window.location.href =
      "https://drive.google.com/drive/folders/1m7ikCrdk6RMqxaYYfQGDVr8e3TxfQmRs";

    });

  </script>

</body>
</html>
